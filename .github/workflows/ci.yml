name: ci

# Manual trigger only — run from the Actions tab when a checkpoint needs
# cross-platform proof.
on:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
      - name: configure
        # mingw cmake's curl ships without a CA store; point it at msys2's.
        run: cmake -S . -B build -G Ninja -DCMAKE_TLS_CAINFO=/usr/ssl/certs/ca-bundle.crt
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure
      - name: static import audit
        run: |
          if objdump -p build/izan_tests.exe | grep 'DLL Name' | grep -ivE 'api-ms|kernel32|bcrypt'; then
            echo 'non-system DLL import found'; exit 1
          fi
          echo 'static: system DLLs only'
